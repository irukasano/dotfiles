# ~/.config/tmux/tmux.conf

##### 基本 #####
set -g default-terminal "tmux-256color"
set -g mouse on
set -g escape-time 0
set -g display-time 4000
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
set -g focus-events on
set -g set-clipboard on
set -g status-position bottom

##### prefix #####
set -g prefix C-b
unbind C-b
bind C-b send-prefix

##### TPM / plugins #####
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'pablobfonseca/cyberpunk-theme'
#set -g @plugin 'admSla99/tmux-cyberpunk'
set -g @plugin "janoamaral/tokyo-night-tmux"

run-shell "$HOME/.tmux/plugins/tpm/tpm"

# theme
set -g @tokyo-night-tmux_theme night
set -g @tokyo-night-tmux_transparent 0
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_pane_id_style fsquare
set -g @tokyo-night-tmux_zoom_id_style hsquare
set -g @tokyo-night-tmux_date_format YMD
set -g @tokyo-night-tmux_time_format 24H
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format full
set -g @tokyo-night-tmux_show_hostname 1

# Force the non-powerline message area to stay readable regardless of theme defaults.
set -g message-style 'fg=colour255,bg=black'
set -g message-command-style 'fg=colour255,bg=black'

# Keep pane backgrounds transparent to the parent terminal after theme load.
#set -g window-style 'bg=default'
#set -g window-active-style 'bg=default'

##### reload #####
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display-message "tmux.conf reloaded"

##### zellij 風ガイド表示つき Alt 入口 #####
bind-key -n M-p display-message '#[fg=colour45,bold]#[fg=colour232,bg=colour45,bold] Alt-p #[fg=colour45,bg=colour31]#[fg=colour255,bg=colour31,bold] pane #[default]  #[fg=colour118,bold][n]#[default] new  #[fg=colour220,bold][|]#[default] split-v  #[fg=colour220,bold][-]#[default] split-h  #[fg=colour141,bold][hjkl/←↓↑→]#[default] move  #[fg=colour160,bold][x]#[default] close  #[fg=colour214,bold][f]#[default] full  #[fg=colour75,bold][s]#[default] pick  #[fg=colour244,bold][q/esc]#[default] cancel' \; switch-client -T pane_mode

bind-key -n M-t display-message '#[fg=colour45,bold]#[fg=colour232,bg=colour45,bold] Alt-t #[fg=colour45,bg=colour31]#[fg=colour255,bg=colour31,bold] tab #[default]  #[fg=colour118,bold][n]#[default] new  #[fg=colour141,bold][h/l][←/→][j/k]#[default] move  #[fg=colour160,bold][x]#[default] close  #[fg=colour214,bold][r]#[default] rename  #[fg=colour75,bold][s]#[default] list  #[fg=colour244,bold][q/esc]#[default] cancel' \; switch-client -T tab_mode

bind-key -n M-o display-message '#[fg=colour45,bold]#[fg=colour232,bg=colour45,bold] Alt-o #[fg=colour45,bg=colour31]#[fg=colour255,bg=colour31,bold] session #[default]  #[fg=colour118,bold][d]#[default] detach  #[fg=colour118,bold][n]#[default] new  #[fg=colour214,bold][r]#[default] rename  #[fg=colour75,bold][s]#[default] list  #[fg=colour160,bold][x]#[default] kill  #[fg=colour244,bold][q/esc]#[default] cancel' \; switch-client -T session_mode

bind-key -n M-e display-message '#[fg=colour45,bold]#[fg=colour232,bg=colour45,bold] Alt-e #[fg=colour45,bg=colour31]#[fg=colour255,bg=colour31,bold] edit #[default]  #[fg=colour118,bold][s]#[default] select  #[fg=colour75,bold][p]#[default] paste  #[fg=colour244,bold][q/esc]#[default] cancel' \; switch-client -T edit_mode

bind-key -n M-q confirm-before -p "Kill current tmux session? (y/n)" kill-session

# Auto-name tmux's default numeric sessions on creation, including the first session from plain `tmux`.
# Pass the socket path explicitly because hooks can run without a client-side TMUX environment.
set-hook -g session-created "run-shell '$HOME/dotfiles/config/tmux/bin/new-session-auto.sh --socket-path #{socket_path} --rename-default #{session_name}'"

##### pane_mode #####
bind-key -T pane_mode Escape switch-client -T root
bind-key -T pane_mode q      switch-client -T root

# new
bind-key -T pane_mode n split-window -v -c "#{pane_current_path}" \; switch-client -T root

# split
bind-key -T pane_mode '|' split-window -h -c "#{pane_current_path}" \; switch-client -T root
bind-key -T pane_mode '-' split-window -v -c "#{pane_current_path}" \; switch-client -T root

# focus
bind-key -T pane_mode Up    select-pane -U \; switch-client -T root
bind-key -T pane_mode Down  select-pane -D \; switch-client -T root
bind-key -T pane_mode Left  select-pane -L \; switch-client -T root
bind-key -T pane_mode Right select-pane -R \; switch-client -T root

bind-key -T pane_mode h select-pane -L \; switch-client -T root
bind-key -T pane_mode j select-pane -D \; switch-client -T root
bind-key -T pane_mode k select-pane -U \; switch-client -T root
bind-key -T pane_mode l select-pane -R \; switch-client -T root

# close / full
bind-key -T pane_mode x kill-pane \; switch-client -T root
bind-key -T pane_mode f resize-pane -Z \; switch-client -T root
bind-key -T pane_mode z resize-pane -Z \; switch-client -T root

# extras
bind-key -T pane_mode s display-panes \; switch-client -T root
bind-key -T pane_mode r respawn-pane -k -c "#{pane_current_path}" \; switch-client -T root

# resize
bind-key -T pane_mode H resize-pane -L 5 \; switch-client -T root
bind-key -T pane_mode J resize-pane -D 3 \; switch-client -T root
bind-key -T pane_mode K resize-pane -U 3 \; switch-client -T root
bind-key -T pane_mode L resize-pane -R 5 \; switch-client -T root

##### tab_mode (tmux 的には window) #####
bind-key -T tab_mode Escape switch-client -T root
bind-key -T tab_mode q      switch-client -T root

bind-key -T tab_mode n new-window -c "#{pane_current_path}" \; switch-client -T root

bind-key -T tab_mode Left  previous-window \; switch-client -T root
bind-key -T tab_mode Right next-window     \; switch-client -T root
bind-key -T tab_mode h     previous-window \; switch-client -T root
bind-key -T tab_mode l     next-window     \; switch-client -T root
bind-key -T tab_mode j     next-window     \; switch-client -T root
bind-key -T tab_mode k     previous-window \; switch-client -T root

bind-key -T tab_mode x kill-window \; switch-client -T root
bind-key -T tab_mode r command-prompt -I "#W" "rename-window -- '%%'" \; switch-client -T root
bind-key -T tab_mode s choose-tree -w \; switch-client -T root

bind-key -T tab_mode 1 select-window -t:=1 \; switch-client -T root
bind-key -T tab_mode 2 select-window -t:=2 \; switch-client -T root
bind-key -T tab_mode 3 select-window -t:=3 \; switch-client -T root
bind-key -T tab_mode 4 select-window -t:=4 \; switch-client -T root
bind-key -T tab_mode 5 select-window -t:=5 \; switch-client -T root
bind-key -T tab_mode 6 select-window -t:=6 \; switch-client -T root
bind-key -T tab_mode 7 select-window -t:=7 \; switch-client -T root
bind-key -T tab_mode 8 select-window -t:=8 \; switch-client -T root
bind-key -T tab_mode 9 select-window -t:=9 \; switch-client -T root

##### session_mode #####
bind-key -T session_mode Escape switch-client -T root
bind-key -T session_mode q      switch-client -T root

bind-key -T session_mode d detach-client \; switch-client -T root
bind-key -T session_mode n run-shell "$HOME/dotfiles/config/tmux/bin/new-session-auto.sh --socket-path '#{socket_path}' '#{pane_current_path}'" \; switch-client -T root
bind-key -T session_mode r command-prompt -I "#S" "rename-session -- '%%'" \; switch-client -T root
bind-key -T session_mode s choose-tree -Zs \; switch-client -T root
bind-key -T session_mode x confirm-before -p "Kill current session? (y/n)" kill-session \; switch-client -T root

##### edit_mode #####
bind-key -T edit_mode Escape switch-client -T root
bind-key -T edit_mode q      switch-client -T root
bind-key -T edit_mode s      copy-mode \; send-keys -X begin-selection \; switch-client -T root
bind-key -T edit_mode p      paste-buffer \; switch-client -T root

##### copy_mode #####
bind-key -T copy-mode-vi y      send-keys -X copy-pipe-and-cancel '/usr/local/bin/osc52.sh'
bind-key -T copy-mode-vi Enter  send-keys -X copy-pipe-and-cancel '/usr/local/bin/osc52.sh'

##### prefix 系も最低限残す #####
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind & kill-window
bind z resize-pane -Z
bind Tab last-window
bind Space next-layout
